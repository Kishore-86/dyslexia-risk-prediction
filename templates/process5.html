<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Model Training Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#eef3f9;
font-family:'Poppins',sans-serif;
}

/* SIDEBAR */

.sidebar{
height:100vh;
width:250px;
position:fixed;
left:0;
top:0;
background:linear-gradient(180deg,#0f4c81,#1c87ff);
padding:30px 20px;
color:white;
box-shadow:3px 0 20px rgba(0,0,0,0.2);
}

.logo{
text-align:center;
font-weight:700;
margin-bottom:40px;
font-size:22px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:14px 16px;
border-radius:12px;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.menu a:hover{
background:rgba(255,255,255,0.18);
transform:translateX(6px);
}

.menu a.active{
background:white;
color:#0f4c81;
font-weight:600;
}

.menu a.logout{
margin-top:20px;
background:rgba(255,80,80,0.2);
}

.menu a.logout:hover{
background:#ff4d4d;
color:white;
}

/* HEADER */

.header{
margin-left:250px;
height:75px;
background:linear-gradient(135deg,#ffffff,#f4f7fc);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.header-left h4{
font-weight:700;
color:#0f4c81;
display:flex;
align-items:center;
gap:10px;
}

/* MAIN */

.main-content{
margin-left:250px;
padding:40px;
}

/* ACCURACY CARD */

.accuracy-card{
background:linear-gradient(135deg,#1c87ff,#0f4c81);
color:white;
padding:35px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
text-align:center;
margin-bottom:30px;
}

.accuracy-card h2{
font-size:50px;
font-weight:700;
margin:10px 0;
}

/* CHART CARDS */

.chart-card{
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.chart-title{
font-weight:700;
color:#0f4c81;
margin-bottom:15px;
display:flex;
align-items:center;
gap:8px;
}

/* BIG CHART */

.big-chart{
height:350px;
}

/* SMALL CHART */

.small-chart{
height:260px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h3 class="logo"><i class="fa fa-brain"></i> NeuroRead</h3>

<div class="menu">
<a href="/admin_dashboard"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="/Users"><i class="fa fa-users"></i> Manage Users</a>
<a class="active" href="/process5"><i class="fa fa-brain"></i> Train Model</a>
<a class="logout" href="/logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

</div>

<!-- HEADER -->

<div class="header">
<div class="header-left">
<h4><i class="fa fa-chart-line"></i> Model Training Analysis</h4>
</div>
<div class="user-profile">
<span>Admin</span>
</div>
</div>

<!-- MAIN CONTENT -->

<div class="main-content">

<div class="container-fluid">

<!-- MODEL ACCURACY -->

<div class="accuracy-card">

<i class="fa fa-brain fa-2x"></i>
<h5>Final Model Accuracy</h5>

<h2>97.33%</h2>

<p>Neural Network Classification Performance</p>

</div>

<!-- LABEL DISTRIBUTION BIG CHART -->

<div class="chart-card">

<h5 class="chart-title">
<i class="fa fa-chart-bar"></i> Dataset Label Distribution
</h5>

<div class="big-chart">
<canvas id="labelChart"></canvas>
</div>

</div>

<!-- LOSS + ACCURACY SIDE BY SIDE -->

<div class="row g-4">

<div class="col-md-6">

<div class="chart-card">

<h5 class="chart-title">
<i class="fa fa-chart-line"></i> Training Loss
</h5>

<div class="small-chart">
<canvas id="lossChart"></canvas>
</div>

</div>

</div>

<div class="col-md-6">

<div class="chart-card">

<h5 class="chart-title">
<i class="fa fa-chart-area"></i> Model Accuracy
</h5>

<div class="small-chart">
<canvas id="accuracyChart"></canvas>
</div>

</div>

</div>

</div>

</div>

</div>

<!-- FOOTER -->

<footer class="bg-dark text-white text-center mt-5 p-3">
NeuroRead AI Dyslexia Detection System
</footer>

<!-- CHARTS -->

<script>

new Chart(document.getElementById("labelChart"), {

type:"bar",

data:{
labels: {{ label_labels | safe }},
datasets:[{
label:"Label Count",
data: {{ label_values | safe }},
backgroundColor:['#1c87ff','#0f4c81']
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}

});


new Chart(document.getElementById("lossChart"), {

type:"line",

data:{
labels: {{ epochs | safe }},
datasets:[{
label:"Training Loss",
data: {{ loss | safe }},
borderColor:"#0f4c81",
backgroundColor:"rgba(12,135,255,0.2)",
tension:0.3,
fill:true
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}}
}

});


new Chart(document.getElementById("accuracyChart"), {

type:"line",

data:{
labels: {{ epochs | safe }},
datasets:[{
label:"Accuracy",
data: {{ accuracy | safe }},
borderColor:"#1c87ff",
backgroundColor:"rgba(28,135,255,0.2)",
tension:0.3,
fill:true
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true,max:1}}
}

});

</script>

</body>
</html>

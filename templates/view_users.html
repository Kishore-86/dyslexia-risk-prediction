<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manage Users | NeuroRead</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#eef3f9;
font-family:'Poppins',sans-serif;
}

/* SIDEBAR */
.sidebar{
height:100vh;
width:250px;
position:fixed;
left:0;
top:0;
background:linear-gradient(180deg,#0f4c81,#1c87ff);
padding:30px 20px;
color:white;
box-shadow:3px 0 20px rgba(0,0,0,0.2);
}

.logo{
text-align:center;
font-weight:700;
margin-bottom:40px;
font-size:22px;
letter-spacing:1px;
}

.logo i{
margin-right:8px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:14px 16px;
border-radius:12px;
text-decoration:none;
color:white;
font-size:15px;
transition:0.3s;
backdrop-filter:blur(6px);
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
}

.menu a i{
font-size:16px;
width:20px;
text-align:center;
}

.menu a:hover{
background:rgba(255,255,255,0.18);
transform:translateX(6px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.menu a.active{
background:white;
color:#0f4c81;
font-weight:600;
box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

.menu a.logout{
margin-top:20px;
background:rgba(255,80,80,0.2);
}

.menu a.logout:hover{
background:#ff4d4d;
color:white;
}

/* HEADER */

.header{
margin-left:250px;
height:75px;
background:linear-gradient(135deg,#ffffff,#f4f7fc);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
border-bottom:1px solid #e6ecf2;
}

.header-left h4{
font-weight:700;
color:#0f4c81;
display:flex;
align-items:center;
gap:10px;
}

.search-box{
display:flex;
align-items:center;
background:white;
border-radius:25px;
padding:6px 15px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.search-box input{
border:none;
outline:none;
padding:5px 8px;
font-size:14px;
}

.search-box i{
color:#999;
}

.header-right{
display:flex;
align-items:center;
gap:25px;
}

.notification{
position:relative;
font-size:20px;
color:#1c87ff;
cursor:pointer;
}

.badge{
position:absolute;
top:-6px;
right:-8px;
background:red;
color:white;
font-size:11px;
padding:3px 6px;
border-radius:50%;
}

.user-profile{
display:flex;
align-items:center;
gap:8px;
font-weight:600;
}

.user-profile img{
width:35px;
height:35px;
border-radius:50%;
}

/* MAIN CONTENT */

.main-content{
margin-left:250px;
padding:40px;
}

/* TABLE */

.user-table{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.table thead{
background:#0f4c81;
color:white;
}

.table td{
vertical-align:middle;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h3 class="logo"><i class="fa fa-brain"></i> NeuroRead</h3>

<div class="menu">

<a href="/admin_dashboard">
<i class="fa fa-chart-line"></i>
<span>Dashboard</span>
</a>

<a class="active" href="/users">
<i class="fa fa-users"></i>
<span>Manage Users</span>
</a>

<a href="/process1">
<i class="fa fa-brain"></i>
<span>Train Model</span>
</a>

<a class="logout" href="/logout">
<i class="fa fa-sign-out-alt"></i>
<span>Logout</span>
</a>

</div>
</div>

<!-- HEADER -->

<div class="header">

<div class="header-left">
<h4><i class="fa fa-users"></i> Registered Users</h4>
</div>

<div class="header-center">
<div class="search-box">
<i class="fa fa-search"></i>
<input type="text" placeholder="Search users...">
</div>
</div>

<div class="header-right">

<div class="notification">
<i class="fa fa-bell"></i>
<span class="badge">3</span>
</div>

<div class="user-profile">
<img src="https://i.pravatar.cc/40">
<span>Admin</span>
</div>

</div>
</div>

<!-- MAIN CONTENT -->

<div class="main-content">

<div class="container-fluid">

<div class="user-table">

<h4 class="mb-4">
<i class="fa fa-users"></i> All Registered Users
</h4>

<table class="table table-bordered table-hover text-center">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Age</th>
<th>Gender</th>
<th>Username</th>
</tr>

</thead>
<tbody>

{% for u in users %}

<tr>

<td>{{u[0]}}</td>
<td>{{u[1]}}</td>
<td>{{u[2]}}</td>
<td>{{u[3]}}</td>
<td>{{u[4]}}</td>
<td>{{u[5]}}</td>
<td>{{u[6]}}</td>

<td>
<a href="/delete_user/{{u[0]}}"
class="btn btn-danger btn-sm"
onclick="return confirm('Are you sure to delete this user?')">

<i class="fa fa-trash"></i> Delete
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
